services:
  ai-review-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-review-service
    ports:
      - "3000:3000"
    environment:
      APP_ENV: production
      PORT: "3000"
      LOG_LEVEL: info
      SWAGGER_ENABLED: "true"
      CLIENTS_CONFIG_PATH: /run/secrets/clients-config
      MODEL_API_KEY_PATH: /run/secrets/model-api-key
      MODEL_PROVIDER: amvera
      MODEL_NAME: gpt-5
      MODEL_TIMEOUT_MS: "120000"
    secrets:
      - clients-config
      - model-api-key
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

secrets:
  clients-config:
    file: ./secrets/clients.json
  model-api-key:
    file: ./secrets/model-api-key.txt
