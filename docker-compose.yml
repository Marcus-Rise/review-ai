services:
  model:
    image: ollama/ollama:latest
    container_name: ai-review-model
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ai-review-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-review-service
    ports:
      - "3000:3000"
    environment:
      APP_ENV: production
      PORT: "3000"
      LOG_LEVEL: info
      SWAGGER_ENABLED: "true"
      CLIENTS_CONFIG_PATH: /run/secrets/clients.json
      MODEL_ENDPOINT: http://model:11434
      MODEL_NAME: qwen2.5-coder:7b
      MODEL_TIMEOUT_MS: "120000"
    volumes:
      - ./secrets/clients.json:/run/secrets/clients.json:ro
    depends_on:
      model:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  ollama_data:
