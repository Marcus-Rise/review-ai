name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-review-service:test .

      - name: Smoke test — container starts and responds
        run: |
          docker run -d --name test-container \
            -e APP_ENV=production \
            -e SWAGGER_ENABLED=false \
            -e MODEL_ENDPOINT=http://localhost:11434 \
            -e MODEL_NAME=test \
            -p 3000:3000 \
            ai-review-service:test
          sleep 5
          docker logs test-container 2>&1
          STATUS=$(docker inspect test-container --format='{{.State.Status}}')
          echo "Container status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "Container is not running!"
            exit 1
          fi
          curl -sf http://localhost:3000/healthz && echo " OK" || echo "Healthcheck endpoint not reachable (non-fatal)"
          docker stop test-container

  publish:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
