name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-review-service:test .

      - name: Smoke test — container starts and responds
        run: |
          docker run -d --name test-container \
            -e APP_ENV=production \
            -e SWAGGER_ENABLED=false \
            -e MODEL_ENDPOINT=http://localhost:11434 \
            -e MODEL_NAME=test \
            -p 3000:3000 \
            ai-review-service:test
          sleep 5
          docker logs test-container 2>&1
          STATUS=$(docker inspect test-container --format='{{.State.Status}}')
          echo "Container status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "Container is not running!"
            exit 1
          fi
          curl -sf http://localhost:3000/healthz && echo " OK" || echo "Healthcheck endpoint not reachable (non-fatal)"
          docker stop test-container
