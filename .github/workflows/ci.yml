name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-review-service:test .

      - name: Verify image exists
        run: docker images ai-review-service:test

      - name: Start container
        run: |
          docker run -d --name test-container \
            -e SWAGGER_ENABLED=true \
            -e MODEL_ENDPOINT=http://localhost:11434 \
            -e MODEL_NAME=test \
            -e APP_ENV=production \
            -p 3000:3000 \
            ai-review-service:test

      - name: Wait and show logs
        run: |
          sleep 5
          echo "=== Container status ==="
          docker inspect test-container --format='{{.State.Status}} exit={{.State.ExitCode}}'
          echo "=== Container logs ==="
          docker logs test-container 2>&1
          echo "=== End logs ==="

      - name: Healthcheck
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:3000/healthz; then
              echo "Healthcheck passed"
              exit 0
            fi
            echo "Attempt $i failed, waiting 3s..."
            sleep 3
          done
          echo "All attempts failed"
          docker logs test-container 2>&1
          exit 1

      - name: Cleanup
        if: always()
        run: docker stop test-container || true
