name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-review-service:${{ github.sha }} .

      - name: Test Docker healthcheck
        run: |
          docker run -d --name test-container \
            -e SWAGGER_ENABLED=true \
            -e MODEL_ENDPOINT=http://localhost:11434 \
            -e MODEL_NAME=test \
            -p 3000:3000 \
            ai-review-service:${{ github.sha }}
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:3000/healthz; then
              echo "Healthcheck passed"
              docker stop test-container
              exit 0
            fi
            echo "Attempt $i: waiting..."
            sleep 3
          done
          echo "Healthcheck failed"
          docker logs test-container
          docker stop test-container
          exit 1
